<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally AI Test Case Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
        }

        .status {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .output-section {
            margin-top: 20px;
        }

        .output-section h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .output {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #333;
        }

        .download-btn {
            background: #28a745;
            margin-top: 10px;
        }

        .download-btn:hover {
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .story-item {
            padding: 12px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
        }

        .story-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .story-item.selected {
            background: #e8eef9;
            border-color: #667eea;
        }

        .story-id {
            font-weight: 600;
            color: #667eea;
        }

        .story-name {
            color: #333;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Rally AI Test Case Generator</h1>
            <p class="subtitle">Transform Acceptance Criteria into AI-Generated Test Cases and Postman Requests</p>
        </header>

        <div class="content">
            <!-- Configuration Panel -->
            <div class="card">
                <h2>⚙️ Configuration</h2>
                <div id="configStatus"></div>
                
                <div class="form-group">
                    <label for="aiProvider">AI Provider (Select One)</label>
                    <select id="aiProvider">
                        <option value="groq">🚀 GROQ (Free, Recommended)</option>
                        <option value="openai">🤖 OpenAI GPT-4</option>
                        <option value="gemini">✨ Google Gemini</option>
                        <option value="claude">🧠 Claude 3.5 Sonnet</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="aiApiKey" id="aiKeyLabel">GROQ API Key</label>
                    <input type="password" id="aiApiKey" placeholder="Get free key from https://console.groq.com/keys">
                </div>

                <div class="form-group">
                    <label for="rallyApiKey">Rally API Key (Optional)</label>
                    <input type="password" id="rallyApiKey" placeholder="Your Rally API key (leave blank to skip)">
                </div>

                <div class="form-group">
                    <label for="rallyWorkspaceUrl">Rally Workspace URL (Optional)</label>
                    <input type="text" id="rallyWorkspaceUrl" placeholder="https://rally1.rallydev.com">
                </div>

                <button onclick="validateConfiguration()">✓ Validate Configuration</button>
            </div>

            <!-- Rally Stories Panel -->
            <div class="card">
                <h2>📋 Rally Stories</h2>
                <div id="storiesStatus"></div>
                
                <button onclick="fetchStories()" style="width: 100%;">Fetch Stories from Rally</button>
                
                <div class="output-section" style="margin-top: 20px;">
                    <h3>Available Stories:</h3>
                    <div id="storiesList" class="output" style="max-height: 300px; padding: 0;">
                        <p style="padding: 15px; color: #999;">No stories loaded. Fetch from Rally first.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Generation Panel -->
        <div class="card">
            <h2>🧪 Generate Test Cases & Postman Requests</h2>
            <div id="generationStatus"></div>

            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('manual')">Manual Input</button>
                <button class="tab-button" onclick="switchTab('fromralley')">From Rally Story</button>
            </div>

            <!-- Manual Input Tab -->
            <div id="manual" class="tab-content active">
                <div class="form-group">
                    <label for="storyName">Story Name / Title</label>
                    <input type="text" id="storyName" placeholder="e.g., User Login Feature">
                </div>

                <div class="form-group">
                    <label for="acceptanceCriteria">Acceptance Criteria</label>
                    <textarea id="acceptanceCriteria" placeholder="Enter acceptance criteria here...&#10;&#10;Example:&#10;- Given a user is on the login page&#10;- When they enter valid credentials&#10;- Then they should be logged in successfully"></textarea>
                </div>

                <div class="form-group">
                    <label for="apiEndpoint">API Endpoint (Optional - for Postman generation)</label>
                    <input type="text" id="apiEndpoint" placeholder="e.g., https://api.example.com/auth/login (leave blank for generic requests)">
                </div>

                <div class="button-group">
                    <button onclick="generateTestCases()">Generate Test Cases</button>
                    <button onclick="generatePostmanRequests()">Generate Postman Requests</button>
                </div>
            </div>

            <!-- From Rally Tab -->
            <div id="fromralley" class="tab-content">
                <div class="form-group">
                    <label for="selectedStoryId">Select Story</label>
                    <input type="text" id="selectedStoryId" placeholder="e.g., US123" readonly>
                </div>

                <div id="selectedStoryDetails"></div>

                <div class="form-group">
                    <label for="rallyApiEndpoint">API Endpoint (Optional)</label>
                    <input type="text" id="rallyApiEndpoint" placeholder="https://api.example.com/endpoint (leave blank for generic requests)">
                </div>

                <div class="button-group">
                    <button onclick="generateFromRalleyStory()">Generate Both (Test Cases + Postman)</button>
                </div>
            </div>

            <!-- Output Section -->
            <div class="output-section" id="outputSection" style="display: none;">
                <div class="tabs">
                    <button class="tab-button active" onclick="switchOutputTab('raw')">AI Generated Text</button>
                    <button class="tab-button" onclick="switchOutputTab('parsed')" id="parsedTabButton">Structured Data</button>
                </div>

                <div id="raw" class="tab-content active">
                    <h3>AI Generated Output:</h3>
                    <div id="rawOutput" class="output"></div>
                </div>

                <div id="parsed" class="tab-content">
                    <h3 id="parsedOutputTitle">Structured Data:</h3>
                    <div id="parsedOutput" class="output"></div>
                    <div style="margin-top: 10px; text-align: center;">
                        <button onclick="copyToClipboard()" style="background: #17a2b8; margin-right: 10px;">📋 Copy JSON</button>
                    </div>
                </div>

                <button class="download-btn" onclick="downloadResults()">📥 Download Results as JSON</button>
                <button class="download-btn" style="background:#007bff;" onclick="downloadTextResults()">📄 Download as TXT</button>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = {};
        let currentResults = {};
        let selectedStory = null;
        let currentResultType = 'testcases'; // 'testcases' or 'postman'

        // Update AI key label when provider changes
        document.addEventListener('DOMContentLoaded', function() {
          const providerSelect = document.getElementById('aiProvider');
          const keyLabel = document.getElementById('aiKeyLabel');
          const keyInput = document.getElementById('aiApiKey');
          
          const providerLabels = {
            'groq': 'GROQ API Key (Free)',
            'openai': 'OpenAI API Key',
            'gemini': 'Google Gemini API Key'
          };

          const providerPlaceholders = {
            'groq': 'Get free key from https://console.groq.com/keys',
            'openai': 'Get key from https://platform.openai.com/api/keys',
            'gemini': 'Get key from https://ai.google.dev'
          };

          if (providerSelect) {
            providerSelect.addEventListener('change', function() {
              keyLabel.textContent = providerLabels[this.value] || 'API Key';
              keyInput.placeholder = providerPlaceholders[this.value];
            });
          }
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function switchOutputTab(tabName) {
            document.querySelectorAll('#outputSection .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('#outputSection .tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showStatus(elementId, message, type = 'info') {
            const statusEl = document.getElementById(elementId);
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.style.display = 'block';
            if (type === 'success') {
                setTimeout(() => statusEl.style.display = 'none', 5000);
            }
        }

        async function validateConfiguration() {
            const aiProvider = document.getElementById('aiProvider').value;
            const aiApiKey = document.getElementById('aiApiKey').value;
            const rallyApiKey = document.getElementById('rallyApiKey').value;
            const rallyWorkspaceUrl = document.getElementById('rallyWorkspaceUrl').value;

            if (!aiApiKey) {
                showStatus('configStatus', '❌ Please enter your AI API key', 'error');
                return;
            }

            try {
                const response = await fetch('/api/config/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        aiProvider: aiProvider,
                        openaiApiKey: aiApiKey,
                        rallyApiKey: rallyApiKey,
                        rallyWorkspaceUrl: rallyWorkspaceUrl
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    currentConfig = { aiProvider, aiApiKey, rallyApiKey, rallyWorkspaceUrl };
                    showStatus('configStatus', `✅ ${aiProvider.toUpperCase()} configured successfully!`, 'success');
                } else {
                    showStatus('configStatus', `❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('configStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function fetchStories() {
            if (!currentConfig.rallyApiKey) {
                showStatus('storiesStatus', '❌ Please validate configuration first', 'error');
                return;
            }

            showStatus('storiesStatus', '⏳ Fetching stories...', 'info');

            try {
                const response = await fetch('/api/rally/stories');
                const data = await response.json();

                if (response.ok) {
                    displayStories(data.stories || []);
                    showStatus('storiesStatus', `✅ Loaded ${(data.stories || []).length} stories`, 'success');
                } else {
                    showStatus('storiesStatus', `❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('storiesStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        function displayStories(stories) {
            const container = document.getElementById('storiesList');
            if (!stories || stories.length === 0) {
                container.innerHTML = '<p style="padding: 15px; color: #999;">No stories found</p>';
                return;
            }

            container.innerHTML = stories.map(story => `
                <div class="story-item" onclick="selectStory('${story.FormattedID}', '${story.Name.replace(/'/g, "\\'")}')">
                    <div class="story-id">${story.FormattedID}</div>
                    <div class="story-name">${story.Name}</div>
                </div>
            `).join('');
        }

        function selectStory(storyId, storyName) {
            selectedStory = { id: storyId, name: storyName };
            document.getElementById('selectedStoryId').value = storyId;
            document.querySelectorAll('.story-item').forEach(el => el.classList.remove('selected'));
            event.target.closest('.story-item').classList.add('selected');
            
            const details = `<p style="color: #666; margin-top: 10px;">📌 Selected: <strong>${storyName}</strong></p>`;
            document.getElementById('selectedStoryDetails').innerHTML = details;
        }

        async function generateTestCases() {
            const storyName = document.getElementById('storyName').value;
            const acceptanceCriteria = document.getElementById('acceptanceCriteria').value;

            if (!storyName || !acceptanceCriteria) {
                showStatus('generationStatus', '❌ Please fill in story name and acceptance criteria', 'error');
                return;
            }

            if (!currentConfig.aiApiKey) {
                showStatus('generationStatus', '❌ Please configure AI provider first', 'error');
                return;
            }

            showStatus('generationStatus', '⏳ Generating test cases... <span class="loading"></span>', 'info');

            try {
                const response = await fetch('/api/generate/testcases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ acceptanceCriteria, storyName })
                });

                const data = await response.json();

                if (response.ok) {
                    currentResults = data;
                    currentResultType = 'testcases';
                    displayResults(data);
                    showStatus('generationStatus', '✅ Test cases generated successfully!', 'success');
                } else {
                    showStatus('generationStatus', `❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('generationStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function generatePostmanRequests() {
            const storyName = document.getElementById('storyName').value;
            const acceptanceCriteria = document.getElementById('acceptanceCriteria').value;
            const endpoint = document.getElementById('apiEndpoint').value;

            if (!storyName || !acceptanceCriteria) {
                showStatus('generationStatus', '❌ Please fill in story name and acceptance criteria', 'error');
                return;
            }

            if (!currentConfig.aiApiKey) {
                showStatus('generationStatus', '❌ Please configure AI provider first', 'error');
                return;
            }

            showStatus('generationStatus', '⏳ Generating Postman requests... <span class="loading"></span>', 'info');

            try {
                const response = await fetch('/api/generate/postman', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ acceptanceCriteria, storyName, endpoint })
                });

                const data = await response.json();

                if (response.ok) {
                    currentResults = data;
                    currentResultType = 'postman';
                    displayResults(data);
                    showStatus('generationStatus', '✅ Postman requests generated successfully!', 'success');
                } else {
                    showStatus('generationStatus', `❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('generationStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function generateFromRalleyStory() {
            if (!selectedStory) {
                showStatus('generationStatus', '❌ Please select a story first', 'error');
                return;
            }

            // Endpoint is now optional
            const endpoint = document.getElementById('rallyApiEndpoint').value;

            showStatus('generationStatus', '⏳ Generating from Rally story... <span class="loading"></span>', 'info');

            try {
                // This would require fetching the story's AC first
                alert('Fetch story AC and generate - implementation in progress');
            } catch (error) {
                showStatus('generationStatus', `❌ Error: ${error.message}`, 'error');
            }
        }

        function displayResults(data) {
            document.getElementById('outputSection').style.display = 'block';
            
            // Show raw AI output
            document.getElementById('rawOutput').textContent = data.rawOutput || JSON.stringify(data, null, 2);
            
            // Update tab labels and content based on result type
            const parsedTabButton = document.getElementById('parsedTabButton');
            const parsedOutputTitle = document.getElementById('parsedOutputTitle');
            
            if (currentResultType === 'postman' && data.collection) {
                // For Postman, show the collection JSON that can be imported
                parsedTabButton.textContent = 'Postman Collection JSON';
                parsedOutputTitle.textContent = 'Postman Collection JSON (Copy & Import):';
                document.getElementById('parsedOutput').textContent = JSON.stringify(data.collection, null, 2);
            } else {
                // For test cases, show the parsed test cases
                parsedTabButton.textContent = 'Structured Data';
                parsedOutputTitle.textContent = 'Structured Data:';
                document.getElementById('parsedOutput').textContent = JSON.stringify(data.parsedTestCases || data.parsedRequests || data, null, 2);
            }
        }

        function downloadResults() {
            if (!currentResults || Object.keys(currentResults).length === 0) {
                alert('No results to download');
                return;
            }

            const dataStr = JSON.stringify(currentResults, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `test-cases-${new Date().getTime()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function copyToClipboard() {
            const outputElement = document.getElementById('parsedOutput');
            const text = outputElement.textContent;
            
            navigator.clipboard.writeText(text).then(function() {
                // Show temporary success message
                const originalText = outputElement.textContent;
                outputElement.textContent = '✅ Copied to clipboard!';
                setTimeout(() => {
                    outputElement.textContent = originalText;
                }, 2000);
            }).catch(function(err) {
                console.error('Failed to copy: ', err);
                alert('Failed to copy to clipboard. Please select and copy manually.');
            });
        }
    </script>
</body>
</html>
